openapi: 3.0.3
info:
  title: Specification for State API handling user info
  description: |-
    API that handles user info for a video-game marketplace. Functionality includes:
    - Creating/getting/removing users
    - Creating/getting/removing items
    - Creating/getting/removing currencies
    - Adding/removing/transferring items from inventory
    - Adding/removing/transferring currency from wallet
  version: 1.0-SNAPSHOT
servers:
  - url: http://localhost:8080/marketplace/state/v1
tags:
  - name: Users
    description: User profiles (retrieve, create, update, delete)
  - name: Wallet
    description: Wallet balances, deposits, withdrawals, and transfers
  - name: Inventory
    description: Item stacks, reservations, and consumption
  - name: Items
    description: Item templates (catalog)
  - name: Transfers
    description: Cross-user currency and item movements

paths:
  # Get user information/delete user
  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get user information
      description: Get user information (username, email, create time) using ID
      operationId: getUser
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: number
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        404:
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete user with given ID
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        204:
          description: Successfully deleted user
        404:
          $ref: '#/components/responses/NotFound'

  # Create new user
  /users:
    post:
      tags:
        - Users
      summary: Create user
      description: Create user with provided info (username, password, email) and return their info
      operationId: createUser
      requestBody:
        description: Username, password and email
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        201:
          description: User created
          headers:
            Location:
              description: URL of the created user
              schema:
                type:
                  string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        400:
          $ref: '#/components/responses/InvalidInput'
        409:
          $ref: '#/components/responses/ResourceConflict'

  # Get user's balances
  /users/{userId}/wallet:
    get:
      tags:
        - Users
        - Wallet
      summary: Get user's wallet
      description: Get the user's wallet, consisting of balances for each currency, based on the provided userId
      operationId: getWallet
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
        404:
          $ref: '#/components/responses/NotFound'

  # Deposit into user's wallet
  /users/{userId}/wallet/deposit:
    post:
      tags:
        - Users
        - Wallet
      summary: Deposit currency into wallet
      description: Deposit the specified amount of the specified currency in the wallet of the user denoted by userId
      operationId: depositWallet
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        description: Currency ID and amount
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletRequest'
      responses:
        204:
          description: Deposit successful
        400:
          $ref: '#/components/responses/InvalidInput'
        404:
          $ref: '#/components/responses/NotFound'

  # Withdraw from user's wallet
  /users/{userId}/wallet/withdraw:
    post:
      tags:
        - Users
        - Wallet
      summary: Withdraw currency from wallet
      description: Withdraw the specified amount of the specified currency from the wallet of the user denoted by userId
      operationId: withdrawWallet
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        description: Currency ID and amount
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletRequest'
      responses:
        204:
          description: Withdrawal successful
        400:
          $ref: '#/components/responses/InvalidInput'
        404:
          $ref: '#/components/responses/NotFound'
        409:
          $ref: '#/components/responses/ResourceConflict'

  # Get user's inventory
  /users/{userId}/inventory:
    get:
      tags:
        - Users
        - Inventory
      summary: Get user's inventory
      description: Get the user's inventory, consisting of the amount of each item, based on the provided userId
      operationId: getInventory
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
        404:
          $ref: '#/components/responses/NotFound'

  # Add quantity of item to user's inventory
  /users/{userId}/inventory/add:
    post:
      tags:
        - Users
        - Inventory
      summary: Add item to inventory
      description: Add the specified amount of the specified item to the inventory of the user denoted by userId
      operationId: addInventory
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        description: Item ID and amount
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryRequest'
      responses:
        204:
          description: Item added successfully
        400:
          $ref: '#/components/responses/InvalidInput'
        404:
          $ref: '#/components/responses/NotFound'

  # Remove quantity of item from user's inventory
  /users/{userId}/inventory/remove:
    post:
      tags:
        - Users
        - Inventory
      summary: Remove item from inventory
      description: Remove the specified amount of the specified item from the inventory of the user denoted by userId
      operationId: removeInventory
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        description: Item ID and amount
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryRequest'
      responses:
        204:
          description: Item removed successfully
        400:
          $ref: '#/components/responses/InvalidInput'
        404:
          $ref: '#/components/responses/NotFound'

  # Reserve quantity of item in user's inventory
  /users/{userId}/inventory/reserve:
    post:
      tags:
        - Users
        - Inventory
      summary: Add item to inventory
      description: Move the specified amount of the specified item into the reserve section of the inventory of the user denoted by userId
      operationId: reserveInventory
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        description: Item ID and amount
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryRequest'
      responses:
        204:
          description: Item added successfully
        400:
          $ref: '#/components/responses/InvalidInput'
        404:
          $ref: '#/components/responses/NotFound'

  # Unreserve quantity of item in user's inventory
  /users/{userId}/inventory/unreserve:
    post:
      tags:
        - Users
        - Inventory
      summary: Remove item from inventory
      description: Move the specified amount of the specified item from the reserve section back to the quantity section of the inventory of the user denoted by userId
      operationId: unreserveInventory
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        description: Item ID and amount
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryRequest'
      responses:
        204:
          description: Item removed successfully
        400:
          $ref: '#/components/responses/InvalidInput'
        404:
          $ref: '#/components/responses/NotFound'
        409:
          $ref: '#/components/responses/ResourceConflict'




components:
  schemas:
    UserResponse:
      type: object
      properties:
        id:
          type: number
        username:
          type: string
        email:
          type: string
        createdAt:
          type: string

    WalletResponse:
      type: object
      properties:
        userId:
          type: number
        balances:
          type: array
          items:
            type: object
            properties:
              currencyId:
                type: number
              currencyName:
                type: string
              amount:
                type: number

    InventoryResponse:
      type: object
      properties:
        userId:
          type: number
        inventory:
          type: array
          items:
            type: object
            properties:
              itemId:
                type: number
              itemName:
                type: string
              amount:
                type: number

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        passwordHash:
          type: string
        email:
          type: string

    WalletRequest:
      type: object
      properties:
        currencyId:
          type: number
        amount:
          type: number

    InventoryRequest:
      type: object
      properties:
        itemId:
          type: number
        amount:
          type: number

    GeneralError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  parameters:
    UserIdParam:
      in: path
      name: userId
      required: true
      schema:
        type: string


  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GeneralError'

    InvalidInput:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GeneralError'

    ResourceConflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GeneralError'


